name: Build Custom RustDesk Client

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: Nome do aplicativo
        required: true
        default: Nacional Automacao Remote
      server:
        description: IP ou domínio do servidor
        required: true
        default: 72.60.254.113
      color_primary:
        description: Cor principal (hex)
        required: false
        default: "#ee3520"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      CARGO_TERM_COLOR: always
      VCPKG_DEFAULT_TRIPLET: x64-windows-static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Clone vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          cd vcpkg
          git checkout master

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Set VCPKG_ROOT
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies via vcpkg
        shell: pwsh
        run: |
          .\vcpkg\vcpkg.exe install `
            libvpx:x64-windows-static `
            libyuv:x64-windows-static `
            opus:x64-windows-static `
            aom:x64-windows-static

      - name: Clone RustDesk source
        shell: bash
        run: |
          git clone --depth 1 --branch 1.2.7 https://github.com/rustdesk/rustdesk.git rustdesk-src

      - name: Apply customizations
        shell: bash
        run: |
          set -e
          cd rustdesk-src

          APP_NAME="${{ github.event.inputs.app_name }}"
          SERVER="${{ github.event.inputs.server }}"
          COLOR="${{ github.event.inputs.color_primary }}"

          echo "Aplicando personalizações..."
          echo "Nome: $APP_NAME"
          echo "Servidor: $SERVER"
          echo "Cor: $COLOR"

          if [ -f "libs/hbb_common/src/config.rs" ]; then
            sed -i "s|rs-ny.rustdesk.com|$SERVER|g" libs/hbb_common/src/config.rs || true
            sed -i "s|rs-sg.rustdesk.com|$SERVER|g" libs/hbb_common/src/config.rs || true
            sed -i "s|rs-cn.rustdesk.com|$SERVER|g" libs/hbb_common/src/config.rs || true
            echo "Servidor configurado ✓"
          fi

          if [ -f "../assets/logo.png" ]; then
            cp "../assets/logo.png" res/icon.png || true
            echo "Logo aplicada ✓"
          fi

          if [ -f "../assets/icon.ico" ]; then
            cp "../assets/icon.ico" res/icon.ico || true
            echo "Ícone aplicado ✓"
          fi

          echo "Personalização concluída!"

      - name: Build RustDesk for Windows
        shell: bash
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: |
          set -e
          cd rustdesk-src
          echo "VCPKG_ROOT=$VCPKG_ROOT"
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare output
        shell: bash
        run: |
          set -e
          APP_SAFE=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_-')
          mkdir -p output

          if [ -f "rustdesk-src/target/x86_64-pc-windows-msvc/release/rustdesk.exe" ]; then
            cp "rustdesk-src/target/x86_64-pc-windows-msvc/release/rustdesk.exe" "output/${APP_SAFE}.exe"
          elif [ -f "rustdesk-src/target/release/rustdesk.exe" ]; then
            cp "rustdesk-src/target/release/rustdesk.exe" "output/${APP_SAFE}.exe"
          else
            echo "Executável não encontrado."
            exit 1
          fi

          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-custom-windows
          path: output/*.exe
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }} - ${{ github.event.inputs.app_name }}
          body: |
            ## Cliente RustDesk Personalizado

            - **App:** ${{ github.event.inputs.app_name }}
            - **Servidor:** ${{ github.event.inputs.server }}
            - **Build:** #${{ github.run_number }}

            Baixe o `.exe` abaixo e distribua para seus clientes.
          files: output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
